<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>View Product</title>

  <style>

    body{
        font-family:Arial,sans-serif;
        background:#f4f6f9;
        padding:40px;
    }

    .card{
        max-width:700px;
        margin:auto;
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 8px 20px rgba(0,0,0,0.1);
    }

    h1{
        text-align:center;
        margin-bottom:20px;
    }

    img{
        width:250px;
        height:250px;
        object-fit:cover;
        border-radius:10px;
        display:block;
        margin:auto;
    }

    .info{
        margin-top:20px;
    }

    .info p{
        font-size:18px;
        margin:10px 0;
    }

    .btn{
        display:inline-block;
        margin-top:20px;
        padding:10px 16px;
        background:#6c63ff;
        color:white;
        text-decoration:none;
        border-radius:8px;
    }

    .btn:hover{
        background:#5145cd;
    }

  </style>

</head>

<body>

<div class="card">

  <h1>Product Details</h1>

  <!-- IMAGE -->
  <img th:if="${product.imagename != null}"
       th:src="@{'/uploads/' + ${product.imagename}}">

  <div class="info">

    <p>
      <strong>Name :</strong>
      <span th:text="${product.name}"></span>
    </p>

    <p>
      <strong>Price :</strong>
      ₹ <span th:text="${product.price}"></span>
    </p>

    <p>
      <strong>Stock :</strong>
      <span th:text="${product.stock}"></span>
    </p>

    <p>
      <strong>Details :</strong>
      <span th:text="${product.details}"></span>
    </p>

  </div>

  <a th:href="@{/products}" class="btn">
    Back
  </a>

</div>

</body>
</html>
