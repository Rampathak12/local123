<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Product</title>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
<main class="page">
  <nav class="site-nav">
    <a class="brand" th:href="@{/}">ProductPro</a>
    <div class="nav-links">
      <a th:href="@{/products}">Products</a>
      <a th:href="@{/products/new}">Add Product</a>
    </div>
  </nav>

  <section class="shell">
    <header class="header">
      <div>
        <h1>Product Details</h1>
        <p th:text="${product.name}">Product name</p>
      </div>

      <div class="actions">
        <a th:href="@{/products}" class="btn secondary">Back</a>
        <a th:href="@{'/products/edit/' + ${product.id}}" class="btn warning">Edit</a>
      </div>
    </header>

    <div class="content">
      <div class="detail-grid">
        <div class="detail-media-card">
          <img class="detail-img"
               th:if="${product.imagename != null}"
               th:src="@{'/uploads/' + ${product.imagename}}"
               alt="Product image">

          <div th:if="${product.imagename == null}" class="detail-img no-img">No image</div>
        </div>

        <div class="detail-list">
          <div class="detail-item">
            <span>Name</span>
            <strong th:text="${product.name}">Product name</strong>
          </div>

          <div class="detail-item">
            <span>Price</span>
            <strong>
              $<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span>
            </strong>
          </div>

          <div class="detail-item">
            <span>Stock</span>
            <strong th:text="${product.stock}">0</strong>
          </div>

          <div class="detail-item">
            <span>Details</span>
            <strong th:text="${product.details}">Details</strong>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
