<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle}">Product Form</title>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
<main class="page">
  <nav class="site-nav">
    <a class="brand" th:href="@{/}">ProductPro</a>
    <div class="nav-links">
      <a th:href="@{/products}">Products</a>
      <a th:href="@{/products/new}">Add Product</a>
    </div>
  </nav>

  <section class="shell form-card">
    <header class="header">
      <div>
        <h1 th:text="${pageTitle}">Add Product</h1>
        <p>Enter product information and upload an image.</p>
      </div>
    </header>

    <div class="content">
      <form class="form-grid"
            th:action="${product.id == null} ? @{/products/save} : @{/products/update/{id}(id=${product.id})}"
            th:object="${product}"
            method="post"
            enctype="multipart/form-data">

        <div class="field">
          <label for="name">Product Name</label>
          <input id="name" type="text" th:field="*{name}" placeholder="Product name" required>
        </div>

        <div class="field-pair">
          <div class="field">
            <label for="price">Price</label>
            <input id="price" type="number" step="0.01" min="0" th:field="*{price}" placeholder="0.00" required>
          </div>

          <div class="field">
            <label for="stock">Stock</label>
            <input id="stock" type="number" min="0" th:field="*{stock}" placeholder="0" required>
          </div>
        </div>

        <div class="field">
          <label for="details">Details</label>
          <textarea id="details" th:field="*{details}" placeholder="Product details"></textarea>
        </div>

        <div class="field">
          <label for="imageFile">Product Image</label>
          <input id="imageFile" type="file" name="imageFile" accept="image/*">
        </div>

        <div class="button-row">
          <button type="submit">Save Product</button>
          <a th:href="@{/products}" class="btn secondary">Back to Products</a>
        </div>
      </form>
    </div>
  </section>
</main>
</body>
</html>
