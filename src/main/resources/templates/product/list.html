<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product List</title>
  <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
<main class="page">
  <nav class="site-nav">
    <a class="brand" th:href="@{/}">ProductPro</a>
    <div class="nav-links">
      <a th:href="@{/products}">Products</a>
      <a th:href="@{/products/new}">Add Product</a>
    </div>
  </nav>

  <section class="shell">
    <header class="header">
      <div>
        <h1>Products</h1>
        <p>Search, review, and maintain your product catalog.</p>
      </div>

      <div class="actions">
        <a th:href="@{/}" class="btn secondary">Home</a>
        <a th:href="@{/products/new}" class="btn success">Add Product</a>
      </div>
    </header>

    <div class="content">
      <form th:action="@{/products/search}" method="get" class="search">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Search product by name">
        <button type="submit">Search</button>
        <a th:href="@{/products}" class="btn secondary">Reset</a>
      </form>

      <div class="toolbar">
        <div class="count">
          Total products:
          <span th:text="${#lists.size(products)}">0</span>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Details</th>
            <th>Actions</th>
          </tr>
          </thead>

          <tbody>
          <tr th:if="${#lists.isEmpty(products)}">
            <td colspan="6" class="empty">No products found.</td>
          </tr>

          <tr class="product-row"
              th:each="p, iter : ${products}"
              th:style="'--row-index:' + ${iter.index}">
            <td>
              <img class="product-img"
                   th:if="${p.imagename != null}"
                   th:src="@{'/uploads/' + ${p.imagename}}"
                   alt="Product image">

              <span th:if="${p.imagename == null}" class="no-img">No image</span>
            </td>

            <td>
              <strong th:text="${p.name}">Product name</strong>
            </td>

            <td>
              $<span th:text="${#numbers.formatDecimal(p.price, 1, 2)}">0.00</span>
            </td>

            <td th:text="${p.stock}">0</td>

            <td class="muted" th:text="${p.details}">Details</td>

            <td>
              <div class="actions">
                <a th:href="@{'/products/view/' + ${p.id}}" class="btn secondary">View</a>
                <a th:href="@{'/products/edit/' + ${p.id}}" class="btn warning">Edit</a>
                <a th:href="@{'/products/delete/' + ${p.id}}"
                   class="btn danger"
                   onclick="return confirm('Delete this product?')">Delete</a>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</main>
</body>
</html>
