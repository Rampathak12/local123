<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
<main class="page">
    <nav class="site-nav">
        <a class="brand" th:href="@{/}">ProductPro</a>
        <div class="nav-links">
            <a th:href="@{/products}">Products</a>
            <a th:href="@{/products/new}">Add Product</a>
        </div>
    </nav>

    <section class="shell hero hero-home">
        <div class="hero-main">
            <div class="eyebrow">Inventory workspace</div>
            <h1>Product Management</h1>
            <p>Manage product details, stock levels, prices, and images from one focused dashboard.</p>

            <div class="actions">
                <a class="btn" th:href="@{/products}">View Products</a>
                <a class="btn secondary" th:href="@{/products/new}">Add Product</a>
            </div>

            <form class="search" th:action="@{/products/search}" method="get">
                <input type="text" name="keyword" placeholder="Search by product name" required>
                <button type="submit">Search</button>
            </form>
        </div>
    </section>
</main>
</body>
</html>
